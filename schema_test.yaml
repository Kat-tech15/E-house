components:
  schemas:
    Booking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tenant:
          type: integer
        room:
          type: integer
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          default: pending
        paid:
          type: boolean
      required:
      - id
      - room
      - tenant
    CategoryEnum:
      enum:
      - agent
      - landlord
      type: string
      description: |-
        * `agent` - Agent
        * `landlord` - Landlord
    House:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        owner:
          type: integer
      required:
      - id
      - location
      - name
      - owner
    Login:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    PatchedBooking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tenant:
          type: integer
        room:
          type: integer
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          default: pending
        paid:
          type: boolean
    PatchedHouse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        owner:
          type: integer
    PatchedRoom:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        house:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        category:
          $ref: '#/components/schemas/CategoryEnum'
        rent:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        deposit_required:
          type: boolean
        utilities_included:
          type: string
          maxLength: 100
        status:
          type: string
          readOnly: true
    Review:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tenant:
          type: string
          readOnly: true
        reviewer:
          type: integer
        room:
          type: integer
        rating:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        comment:
          type: string
      required:
      - id
      - reviewer
      - room
      - tenant
    RoleEnum:
      enum:
      - tenant
      - landlord
      type: string
      description: |-
        * `tenant` - Tenant
        * `landlord` - Landlord
    Room:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        house:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        category:
          $ref: '#/components/schemas/CategoryEnum'
        rent:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        deposit_required:
          type: boolean
        utilities_included:
          type: string
          maxLength: 100
        status:
          type: string
          readOnly: true
      required:
      - house
      - id
      - rent
      - status
      - utilities_included
    StatusEnum:
      enum:
      - pending
      - confirmed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `cancelled` - Cancelled
    TypeEnum:
      enum:
      - single_room
      - bedsitter
      - double_room
      - one_bedroom
      type: string
      description: |-
        * `single_room` - Single_room
        * `bedsitter` - Bedsitter
        * `double_room` - Double_room
        * `one_bedroom` - One_bedroom
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        password:
          type: string
          writeOnly: true
          minLength: 6
      required:
      - email
      - id
      - password
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
