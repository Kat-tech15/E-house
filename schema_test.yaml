  /api/houses/rooms/:
    get:
      operationId: houses_rooms_list
      description: List rooms with optional filters for location, category/type, and
        rent range.
      parameters:
      - in: query
        name: category
        schema:
          type: string
        description: Room category/type filter. Supports values like single_room,
          bedsitter, one_bedroom.
      - in: query
        name: location
        schema:
          type: string
        description: Search by house location (contains match).
      - in: query
        name: max_rent
        schema:
          type: number
          format: double
        description: Maximum rent value (rent <= value).
      - in: query
        name: min_rent
        schema:
          type: number
          format: double
        description: Minimum rent value (rent >= value).
      - in: query
        name: rent
        schema:
          type: number
          format: double
        description: Maximum rent value (rent <= value).
      - in: query
        name: room_category
        schema:
          type: string
        description: Alias for category.
      - in: query
        name: room_type
        schema:
          type: string
        description: Alias for category.
      - in: query
        name: type
        schema:
          type: string
        description: Alias for category.
      tags:
      - houses
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'
          description: ''
    post:
      operationId: houses_rooms_create
      tags:
